<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Title Generator | AI Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (min-width: 500px) {
            .input-group {
                flex-direction: row;
            }
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Button group for action buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            background: #f0f0f0;
            color: #333;
            padding: 10px 20px;
            font-size: 14px;
        }

        .action-btn:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }

        .results {
            margin-top: 30px;
        }

        .title-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title-card:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .title-text {
            font-size: 1rem;
            color: #333;
            flex: 1;
        }

        .copy-icon {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-icon:hover {
            background: #764ba2;
        }

        .placeholder {
            text-align: center;
            color: #999;
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            text-align: center;
            width: 100%;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            background: #28a745;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .title-card {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Blog Title Generator <span class="badge">AI Powered</span></h1>
    <p class="subtitle">Enter your topic and get 50+ catchy blog titles instantly</p>

    <div class="input-group">
        <input type="text" id="topicInput" placeholder="Enter blog topic... (e.g., Digital Marketing, Fitness, AI)">
        <button id="generateBtn">✨ Generate Titles</button>
    </div>

    <!-- Action Buttons (Features 1,2,3) -->
    <div class="action-buttons" id="actionButtons" style="display: none;">
        <button id="copyAllBtn" class="action-btn">📋 Copy All Titles</button>
        <button id="downloadPDFBtn" class="action-btn">📄 Download as PDF</button>
        <button id="shareTwitterBtn" class="action-btn">🐦 Share on Twitter</button>
    </div>

    <div id="results" class="results">
        <div class="placeholder">
            💡 Your generated blog titles will appear here
        </div>
    </div>

    <a href="/" class="back-link">← Back to Home</a>
</div>

<div id="toast" class="toast">📋 Copied to clipboard!</div>

<script>
    // FEATURE 4: 60+ Title Templates (more than 50!)
    const titleTemplates = [
        // Original 15
        '10 Proven Ways to Grow Your {topic} Fast',
        'The Ultimate Guide to {topic}',
        'How to Master {topic} in 2025',
        'Top {topic} Mistakes You Should Avoid',
        'Best {topic} Strategies for Beginners',
        'Why {topic} Is More Important Than Ever',
        '7 Secrets to Successful {topic}',
        'Beginner\'s Guide to {topic}',
        'How AI Is Changing {topic}',
        'The Future of {topic}: Trends to Watch',
        '{topic} 101: Everything You Need to Know',
        '5 {topic} Hacks That Actually Work',
        'The Psychology Behind {topic}',
        'How to Monetize Your {topic} Skills',
        '{topic} Success Stories That Will Inspire You',
        
        // New 45+ templates (total 60+)
        '{topic} vs Competition: Who Wins?',
        'The Complete {topic} Checklist for 2025',
        'How to Get Started with {topic} Today',
        '{topic} for Dummies: A Simple Guide',
        'The Hidden Benefits of {topic}',
        'How {topic} Changed My Life',
        'The Dark Side of {topic}',
        '{topic} Myths Debunked',
        'The Evolution of {topic}',
        '{topic} Statistics You Need to Know',
        'How to Measure Success in {topic}',
        'The Cost of Ignoring {topic}',
        '{topic} Best Practices from Experts',
        'The {topic} Revolution: What You Need to Know',
        'How to Build a {topic} Strategy That Works',
        '{topic} for Busy People',
        'The {topic} Roadmap to Success',
        'Why {topic} Is the Future',
        'How to Turn {topic} into a Career',
        'The {topic} Formula: Step by Step',
        '25 {topic} Tips You Haven\'t Heard',
        'The {topic} Manifesto',
        'How to Avoid {topic} Burnout',
        '{topic} Case Studies That Work',
        'The Science of {topic}',
        'How to Teach Yourself {topic}',
        'The {topic} Toolkit: Everything You Need',
        'How to Scale Your {topic} Efforts',
        'The {topic} Masterclass',
        'How to Outsource {topic}',
        'The {topic} Community: Where to Connect',
        'How to Find Your {topic} Niche',
        'The {topic} Blueprint',
        'How to Create a {topic} Empire',
        'The {topic} Mindset',
        'How to Stay Motivated with {topic}',
        'The {topic} Journey: From Zero to Hero',
        'How to Leverage {topic} for Growth',
        'The {topic} Accelerator',
        'How to Network in the {topic} Industry',
        'The {topic} Playbook',
        'How to Balance {topic} with Work',
        'The {topic} Advantage',
        'How to Market Your {topic} Skills',
        'The {topic} Transformation',
        'How to Set {topic} Goals That Stick'
    ];

    let currentTitles = [];

    // FEATURE 5: OpenAI Integration (Real AI)
    // You'll need to add your OpenAI API key to use this
    const USE_REAL_AI = false; // Set to true when you have API key
    const OPENAI_API_KEY = ''; // Add your key here: 'sk-...'

    async function generateWithOpenAI(topic) {
        if (!USE_REAL_AI || !OPENAI_API_KEY) {
            return null;
        }
        
        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        {
                            role: 'system',
                            content: 'You are a blog title expert. Generate 5 creative, catchy blog titles about the given topic. Return only the titles, one per line, no numbers or extra text.'
                        },
                        {
                            role: 'user',
                            content: `Generate 5 blog titles about ${topic}`
                        }
                    ],
                    temperature: 0.8
                })
            });
            
            const data = await response.json();
            const aiTitles = data.choices[0].message.content.split('\n').filter(t => t.trim());
            return aiTitles.slice(0, 5);
        } catch (error) {
            console.error('OpenAI error:', error);
            return null;
        }
    }

    function generateWithTemplates(topic) {
        // Shuffle and pick 5 random titles
        const shuffled = [...titleTemplates];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        const selected = shuffled.slice(0, 5);
        
        // Replace {topic} with actual topic
        return selected.map(template => 
            template.replaceAll('{topic}', topic)
        );
    }

    async function generateTitles() {
        let topic = document.getElementById('topicInput').value.trim();
        const resultsDiv = document.getElementById('results');
        const actionButtons = document.getElementById('actionButtons');
        
        // Default topic if empty
        if (topic === '') {
            topic = 'Blogging';
        }
        
        // Capitalize first letter of each word
        topic = topic.split(' ').map(word => 
            word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
        ).join(' ');
        
        // Show loading
        resultsDiv.innerHTML = '<div class="loading">🤖 AI is thinking...</div>';
        actionButtons.style.display = 'none';
        
        // Try OpenAI first, fallback to templates
        let generatedTitles = await generateWithOpenAI(topic);
        
        if (!generatedTitles) {
            generatedTitles = generateWithTemplates(topic);
        }
        
        currentTitles = generatedTitles;
        
        // Display results with copy icons
        resultsDiv.innerHTML = '';
        generatedTitles.forEach((title, index) => {
            const titleCard = document.createElement('div');
            titleCard.className = 'title-card';
            titleCard.innerHTML = `
                <div class="title-text">${index + 1}. ${title}</div>
                <div class="copy-icon" onclick="copySingleTitle('${title.replace(/'/g, "\\'")}')">Copy</div>
            `;
            resultsDiv.appendChild(titleCard);
        });
        
        // Show action buttons
        actionButtons.style.display = 'flex';
    }
    
    // FEATURE 1: Copy All Button
    function copyAllTitles() {
        const allTitles = currentTitles.map((title, i) => `${i + 1}. ${title}`).join('\n\n');
        navigator.clipboard.writeText(allTitles).then(() => {
            showToast('📋 All ' + currentTitles.length + ' titles copied!');
        });
    }
    
    function copySingleTitle(title) {
        navigator.clipboard.writeText(title).then(() => {
            showToast('📋 Copied: ' + title.substring(0, 50) + (title.length > 50 ? '...' : ''));
        });
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
            toast.textContent = '📋 Copied to clipboard!';
        }, 2000);
    }
    
    // FEATURE 2: Download as PDF
    function downloadAsPDF() {
        if (currentTitles.length === 0) {
            showToast('⚠️ Generate titles first!');
            return;
        }
        
        const topic = document.getElementById('topicInput').value.trim() || 'Blogging';
        const date = new Date().toLocaleDateString();
        
        let pdfContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Blog Titles - ${topic}</title>
                <style>
                    body {
                        font-family: Arial, sans-serif;
                        padding: 40px;
                        max-width: 800px;
                        margin: 0 auto;
                    }
                    h1 { color: #667eea; }
                    .title {
                        background: #f5f5f5;
                        padding: 15px;
                        margin: 10px 0;
                        border-left: 4px solid #667eea;
                    }
                    .footer {
                        margin-top: 40px;
                        color: #999;
                        font-size: 12px;
                        text-align: center;
                    }
                </style>
            </head>
            <body>
                <h1>📝 Blog Titles for "${topic}"</h1>
                <p>Generated on: ${date}</p>
                ${currentTitles.map((title, i) => `<div class="title">${i+1}. ${title}</div>`).join('')}
                <div class="footer">Generated by AI Services Agency</div>
            </body>
            </html>
        `;
        
        // Create download link
        const blob = new Blob([pdfContent], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `blog-titles-${topic.toLowerCase().replace(/\s/g, '-')}.html`;
        link.click();
        URL.revokeObjectURL(link.href);
        
        showToast('📄 Download started! Open in browser to print as PDF');
    }
    
    // FEATURE 3: Share on Twitter
    function shareOnTwitter() {
        if (currentTitles.length === 0) {
            showToast('⚠️ Generate titles first!');
            return;
        }
        
        const topic = document.getElementById('topicInput').value.trim() || 'Blogging';
        const firstTitle = currentTitles[0];
        const text = `Check out these blog titles for "${topic}"!\n\n${firstTitle}\n\nGenerated by @AIServicesAgency`;
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`;
        window.open(url, '_blank');
        showToast('🐦 Opening Twitter...');
    }
    
    // Event Listeners
    document.getElementById('generateBtn').addEventListener('click', generateTitles);
    document.getElementById('copyAllBtn').addEventListener('click', copyAllTitles);
    document.getElementById('downloadPDFBtn').addEventListener('click', downloadAsPDF);
    document.getElementById('shareTwitterBtn').addEventListener('click', shareOnTwitter);
    
    // Generate on Enter key
    document.getElementById('topicInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            generateTitles();
        }
    });
</script>

</body>
</html>
